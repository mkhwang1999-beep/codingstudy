<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>예제야호</title>

<script>
    function firstBtn() {
        alert("첫 버튼입니다.");
    }

    function middleBtn() {
        alert("중간 버튼입니다.");
    }

    function bigBtn() {
        confirm("큰버튼입니다. 종료할까요?");
    }
</script>

<style>
    table {
        border-collapse: collapse;
        width: 500px;
    }

    td {
        border: 1px solid black;
        width: 100px;
        height: 40px;
        text-align: center;
    }

    button {
        width: 100%;
        height: 100%;
    }
</style>
</head>

<body>

<h2>예제야호</h2>

<table>
    <tr>
        <td>
            <button onclick="firstBtn()">처음버튼</button>
        </td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
    </tr>

    <tr>
        <td></td>
        <td></td>
        <td>
            <button onclick="middleBtn()">중간버튼</button>
        </td>
        <td></td>
        <td></td>
    </tr>

    <tr>
        <td></td>
        <td></td>
        <td colspan="3">
            <button onclick="bigBtn()">큰버튼</button>
        </td>
    </tr>
</table>
</body>
</html>
